<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="/Content/css?v=5SsskdAh3ChL4quPJSdTqyWDt4Uye5HAhSRdbwb5Vwg1" rel="stylesheet">
<link href="../../../fonts/css/font-awesome.min.css" rel="stylesheet"><link href="../../../Content/font-face.css" rel="stylesheet"><link href="../../../Content/bootstrap.min.css" rel="stylesheet"><link href="../../../Content/common.css" rel="stylesheet"><link href="../../../bundles/customcss" rel="stylesheet"><link href="../../../fonts/css/font-awesome.min.css" rel="stylesheet"><link href="../../../fonts/css/Bootstrap-select-v1.13.14.css" rel="stylesheet"><link href="../../../Content/toastr.min.css" rel="stylesheet">
    <style>
        h1 {
            font-size: 2em;
        }

        h2 {
            font-size: 1.5em;
        }

        * {
            font-family: 'Roboto';
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5em;
        }

        body {
            background: #fafafa;
            padding: 0;
        }

        nav-bar {
            position: fixed;
            width: 100%
        }

        #sidebar a,
        #sidebar a:hover,
        #sidebar a:focus {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s;
        }

        /* Side Bar*/



        #sidebar.sb-active {
            margin-left: -300px;
        }

        .wrapper {
            display: flex;
            text-decoration: none;
            transition: all 0.3s;
        }


        input, select {
            font-size: inherit !important;
            /*height: 33.5px !important;*/
        }

        table {
            border-collapse: separate;
            border-spacing: 0 0.8em;
        }

        .tbl-data {
            border: 1px solid rgba(0,0,0,.05);
        }

            .tbl-data th {
                font-weight: bold;
                background-color: #F2994A !important;
                color: white;
            }

            .tbl-data input[type=checkbox] {
                width: 20px;
            }

        .tbl-detail tr td {
            padding: 4px 5px 4px 5px;
            border: 1px solid rgba(0,0,0,.05);
        }

        .tbl-checkbox label {
            position: relative;
            top: -11px;
            left: 2px;
        }

        .max-with-fit {
            max-width: fit-content;
        }

        textarea {
            font-size: inherit !important;
        }

        #sidebar {
            min-width: 300px;
            max-width: 300px;
            margin-top: 10px;
            margin-left: 10px;
            color: #fff;
            transition: all 0.3s;
            overflow-y: scroll;
            height: 800px;
            border-radius: 5px;
            background-color: #F2994A;
        }

            #sidebar::-webkit-scrollbar {
                width: 0;
            }

            #sidebar p {
                padding: 15px;
                background: #F2994A;
                font-weight: bold;
                font-size: 20px;
            }

            #sidebar ul.components {
                padding: 20px 0;
            }


            #sidebar ul li a {
                padding: 10px;
                font-size: 1em;
                display: block;
                background-color: #f4a158;
            }

                #sidebar ul li a:hover {
                    background: #d06e17;
                }

            #sidebar ul li.sb-active > a,
            a[aria-expanded="true"] {
                color: #fff;
            }

        a[data-toggle="collapse"] {
            position: relative;
        }

        #navbarSupportedContent .dropdown-toggle::after {
            display: block;
            position: absolute;
            top: 50%;
            right: -15%;
            transform: translateY(-50%);
        }

        .dropdown-toggle::after {
            display: block;
            position: absolute;
            top: 50%;
            right: 7%;
            transform: translateY(-50%);
        }

        #sidebar ul ul a {
            font-size: 0.9em !important;
            padding-left: 30px !important;
            background: #d29a68;
        }

        #content {
            height: calc(100vh - 97px);
            width: 100%;
            padding: 20px;
            transition: all 0.3s;
        }

        #ui-datepicker-div {
            width: fit-content;
        }

        .menu-btn {
            border: none;
            background-color: #F2994A;
        }

            .menu-btn:focus {
                outline: none;
                box-shadow: none;
            }

        .btn-green:hover {
            background-color: #009900;
        }

        .btn-success {
            width: 70px;
            height: 40px;
            font-weight: bold;
        }

        #btn-home {
            padding: 10px;
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }

            #btn-home:hover {
                color: white;
            }

            #btn-home span {
                position: relative;
                top: 2px;
                font-size: 15px;
            }

            #btn-home i {
                position: relative;
                top: 2px;
            }

        .btn-light {
            border: 1px solid #d9cfcf;
        }

        #showModelNeed {
            height: 33.5px;
        }
    </style>
